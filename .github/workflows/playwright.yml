name: Playwright E2E

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'django_q/**'
      - 'sample-project/**'
      - 'playwright/**'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright tests (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_FILE: sample-project/docker-compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: playwright/package-lock.json

      - name: Bring up sample-project stack (web + worker)
        run: docker compose -f $COMPOSE_FILE up --build --detach --wait --wait-timeout 240

      - name: Wait for sample-project /health/ to be ready
        run: |
          for i in $(seq 1 60); do
            if curl --fail --silent http://localhost:8000/health/ > /dev/null; then
              echo "sample-project is up"
              exit 0
            fi
            sleep 2
          done
          echo "sample-project failed to come up"
          docker compose -f $COMPOSE_FILE ps
          docker compose -f $COMPOSE_FILE logs --tail 200
          exit 1

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci --ignore-scripts
          npm run install-browsers -- chromium

      - name: Run Playwright tests
        working-directory: playwright
        env:
          CI: 'true'
          SAMPLE_PROJECT_URL: http://localhost:8000
        run: npm test -- --project=chromium

      - name: Dump compose logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/compose-logs
          docker compose -f $COMPOSE_FILE logs --no-color > /tmp/compose-logs/all.log
          docker compose -f $COMPOSE_FILE logs --no-color web > /tmp/compose-logs/web.log || true
          docker compose -f $COMPOSE_FILE logs --no-color worker > /tmp/compose-logs/worker.log || true

      - name: Tear down compose stack
        if: always()
        run: docker compose -f $COMPOSE_FILE down --volumes --remove-orphans

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report
          retention-days: 14

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose-logs
          retention-days: 14

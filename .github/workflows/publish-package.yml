name: Publish package

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-package:
    if: github.repository == 'tinuvi/django-q2-full-of-juice'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Poetry
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          pipx install poetry==2.4.1
      - name: Compile translation catalogs
        run: |
          sudo apt-get update
          sudo apt-get -y install gettext
          pip install django
          cd django_q && django-admin compilemessages
      - name: Build and publish package
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          poetry version $TAG_NAME
          poetry config pypi-token.pypi ${{ secrets.PYPI_TOKEN }}
          poetry publish --build
